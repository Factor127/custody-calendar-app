  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    body { margin: 0; min-height: 100vh; background: linear-gradient(145deg, #e6f952, #aec013); color: #e2e2e2; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px 10px; }

    #app-frame { background: #0a0a0a; border-radius: 24px; padding: 24px; width: 100%; max-width: 440px; }

    .card { background: #131313; border: 1.5px solid rgba(226,226,226,0.08); border-radius: 20px; padding: 32px 28px; width: 100%; }
    .logo { font-size: 13px; font-weight: 800; color: #e6f952; letter-spacing: .5px; text-transform: uppercase; margin-bottom: 20px; }
    .invite-label { font-size: 12px; font-weight: 700; color: rgba(226,226,226,0.42); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 6px; }
    .invite-from { font-size: 22px; font-weight: 900; color: #e2e2e2; margin-bottom: 20px; line-height: 1.2; }
    .invite-from span { color: #e6f952; }

    .detail-row { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; font-size: 14px; }
    .detail-icon { font-size: 16px; flex-shrink: 0; width: 22px; text-align: center; margin-top: 1px; }
    .detail-text { color: #e2e2e2; line-height: 1.4; }
    .detail-text a { color: #e6f952; text-decoration: none; word-break: break-all; }
    .detail-text a:hover { text-decoration: underline; }

    .divider { height: 1px; background: rgba(226,226,226,0.08); margin: 20px 0; }

    .actions { display: flex; flex-direction: column; gap: 10px; }
    .btn-yes { padding: 16px; border-radius: 50px; border: none; background: #e6f952; color: #0a0a0a; font-size: 16px; font-weight: 800; cursor: pointer; font-family: inherit; transition: background .15s; }
    .btn-yes:hover { background: #aec013; }
    .btn-no  { padding: 16px; border-radius: 50px; border: 1.5px solid rgba(230,249,82,0.35); background: transparent; color: rgba(226,226,226,0.5); font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all .15s; }
    .btn-no:hover { border-color: rgba(230,249,82,0.6); color: #e2e2e2; }

    .confirmed { text-align: center; padding: 16px 0; }
    .confirmed-icon { font-size: 48px; margin-bottom: 12px; }
    .confirmed-title { font-size: 20px; font-weight: 800; margin-bottom: 6px; }
    .confirmed-sub { font-size: 14px; color: rgba(226,226,226,0.42); }

    .loading { text-align: center; color: rgba(226,226,226,0.35); font-size: 14px; padding: 32px 0; }
    .error-msg { text-align: center; color: #ff7351; font-size: 14px; padding: 32px 0; }

    .already { font-size: 13px; color: rgba(226,226,226,0.42); text-align: center; margin-top: 12px; }

    .fill-section { margin-top: 16px; padding: 12px; background: rgba(124,92,191,0.10); border: 1px solid rgba(124,92,191,0.25); border-radius: 12px; }
    .fill-label { font-size: 11px; font-weight: 700; color: rgba(167,139,250,0.7); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
    .fill-input { width: 100%; padding: 10px 12px; margin-bottom: 6px; border-radius: 10px; border: 1px solid rgba(226,226,226,0.12); background: rgba(226,226,226,0.06); color: #e2e2e2; font-size: 14px; font-family: inherit; }
    .fill-input::placeholder { color: rgba(226,226,226,0.3); }

    .decline-section { margin-top: 16px; padding: 12px; background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); border-radius: 12px; }
    .decline-label { font-size: 11px; font-weight: 700; color: rgba(248,113,113,0.7); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
    .decline-select { width: 100%; padding: 10px 12px; margin-bottom: 6px; border-radius: 10px; border: 1px solid rgba(226,226,226,0.12); background: rgba(226,226,226,0.06); color: #e2e2e2; font-size: 14px; font-family: inherit; appearance: auto; }
    .decline-note { width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid rgba(226,226,226,0.12); background: rgba(226,226,226,0.06); color: #e2e2e2; font-size: 14px; font-family: inherit; resize: none; }
    .decline-note::placeholder { color: rgba(226,226,226,0.3); }

<script src="https://t.contentsquare.net/uxa/c6f898e9cb3d8.js"></script>
</head>
<body>
<div id="app-frame">
<div class="card">
  <div class="logo">⚡ Spontany</div>
  <div id="content"><div class="loading">Loading…</div></div>
</div>
</div><!-- /#app-frame -->

<script>
const token = location.pathname.split('/rsvp/')[1];

async function load() {
  try {
    const res = await fetch(`/api/rsvp/${token}`);
    if (!res.ok) throw new Error('invite not found');
    const d = await res.json();
    renderInvite(d);
  } catch(e) {
    document.getElementById('content').innerHTML =
      `<div class="error-msg">This invite link is invalid or has expired.</div>`;
  }
}

function renderInvite(d) {
  const dateLabel = d.date
    ? new Date(d.date + 'T12:00:00').toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long' })
    : null;

  const rows = [];
  if (d.venue)    rows.push(`<div class="detail-row"><span class="detail-icon">✨</span><div class="detail-text">${esc(d.venue)}</div></div>`);
  if (dateLabel)  rows.push(`<div class="detail-row"><span class="detail-icon">📅</span><div class="detail-text">${esc(dateLabel)}${d.time ? ' · ' + esc(d.time) : ''}</div></div>`);
  if (d.location) rows.push(`<div class="detail-row"><span class="detail-icon">📍</span><div class="detail-text">${esc(d.location)}</div></div>`);
  if (d.link)     rows.push(`<div class="detail-row"><span class="detail-icon">🔗</span><div class="detail-text"><a href="${esc(d.link)}" target="_blank" rel="noopener">${esc(d.link.replace(/https?:\/\/(www\.)?/,'').slice(0,50))}</a></div></div>`);

  // Editable inputs for missing details
  const missingHtml = [];
  if (!d.time)     missingHtml.push(`<input id="rsvp-fill-time" type="text" placeholder="Time (e.g. 19:00, Evening)" class="fill-input">`);
  if (!d.venue)    missingHtml.push(`<input id="rsvp-fill-venue" type="text" placeholder="Venue name" class="fill-input">`);
  if (!d.location) missingHtml.push(`<input id="rsvp-fill-address" type="text" placeholder="Address" class="fill-input">`);

  const fillSection = missingHtml.length ? `
    <div class="fill-section">
      <div class="fill-label">Know any missing details?</div>
      ${missingHtml.join('')}
    </div>` : '';

  const alreadyHtml = d.status !== 'pending'
    ? `<div class="already">You already responded: <strong>${d.status === 'accepted' ? '✅ Going' : '❌ Can\'t make it'}</strong></div>`
    : '';

  document.getElementById('content').innerHTML = `
    <div class="invite-label">You're invited by</div>
    <div class="invite-from"><span>${esc(d.inviterName)}</span></div>
    ${rows.join('')}
    ${fillSection}
    ${rows.length || fillSection ? '<div class="divider"></div>' : ''}
    <div class="actions" id="rsvp-actions">
      <button class="btn-yes" onclick="respond('accepted')">✅ Yes, I'm in!</button>
      <button class="btn-no"  onclick="showDeclineFlow()">❌ Can't make it</button>
    </div>
    <div id="decline-flow" style="display:none;">
      <div class="decline-section">
        <div class="decline-label">Reason (optional)</div>
        <select id="rsvp-decline-reason" class="decline-select" onchange="if(this.value==='other'){document.getElementById('rsvp-decline-note').style.display=''}">
          <option value="">Select a reason...</option>
          <option value="Have something booked">Have something booked</option>
          <option value="Too far">Too far</option>
          <option value="Not feeling well">Not feeling well</option>
          <option value="Family commitment">Family commitment</option>
          <option value="Work conflict">Work conflict</option>
          <option value="Another time">Another time</option>
          <option value="other">Other...</option>
        </select>
        <textarea id="rsvp-decline-note" class="decline-note" rows="2" placeholder="Add a note..." style="display:none;margin-top:6px;"></textarea>
      </div>
      <div style="display:flex;gap:10px;margin-top:12px;">
        <button class="btn-no" style="flex:1;" onclick="cancelDecline()">Cancel</button>
        <button class="btn-no" style="flex:1;border-color:rgba(239,68,68,0.4);color:#f87171;" onclick="confirmDecline()">Decline</button>
      </div>
    </div>
    ${alreadyHtml}
  `;
}

function showDeclineFlow() {
  document.getElementById('rsvp-actions').style.display = 'none';
  const fill = document.querySelector('.fill-section');
  if (fill) fill.style.display = 'none';
  document.getElementById('decline-flow').style.display = '';
}

function cancelDecline() {
  document.getElementById('decline-flow').style.display = 'none';
  document.getElementById('rsvp-actions').style.display = '';
  const fill = document.querySelector('.fill-section');
  if (fill) fill.style.display = '';
}

function confirmDecline() {
  const reason = document.getElementById('rsvp-decline-reason')?.value || '';
  const note = document.getElementById('rsvp-decline-note')?.value?.trim() || '';
  const declineNote = reason === 'other' ? note : (reason || note || null);
  respond('declined', declineNote);
}

async function respond(status, note) {
  try {
    // Save any filled-in details before responding
    const time    = document.getElementById('rsvp-fill-time')?.value?.trim() || '';
    const venue   = document.getElementById('rsvp-fill-venue')?.value?.trim() || '';
    const address = document.getElementById('rsvp-fill-address')?.value?.trim() || '';
    if (time || venue || address) {
      const body = {};
      if (time)    body.event_time = time;
      if (venue)   body.venue = venue;
      if (address) body.venue_address = address;
      await fetch(`/api/rsvp/${token}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
    }

    const res = await fetch(`/api/rsvp/${token}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status, note: note || null })
    });
    if (!res.ok) throw new Error();
    const d = await res.json();
    document.getElementById('content').innerHTML = `
      <div class="confirmed">
        <div class="confirmed-icon">${status === 'accepted' ? '🎉' : '😢'}</div>
        <div class="confirmed-title">${status === 'accepted' ? 'You\'re in!' : 'Got it!'}</div>
        <div class="confirmed-sub">${esc(d.inviterName)} has been notified.</div>
      </div>
    `;
  } catch(e) {
    alert('Something went wrong - please try again.');
  }
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

load();
</script>
</body>
</html>
