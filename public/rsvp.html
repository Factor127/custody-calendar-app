<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>You're invited · Spontany</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    body { margin: 0; min-height: 100vh; background: #0c0c15; color: #eeeef8; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }

    .card { background: #1a1a2e; border: 1.5px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 32px 28px; max-width: 420px; width: 100%; }
    .logo { font-size: 13px; font-weight: 800; color: #a78bfa; letter-spacing: .5px; text-transform: uppercase; margin-bottom: 20px; }
    .invite-label { font-size: 12px; font-weight: 700; color: rgba(238,238,248,0.4); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 6px; }
    .invite-from { font-size: 22px; font-weight: 900; color: #eeeef8; margin-bottom: 20px; line-height: 1.2; }
    .invite-from span { color: #a78bfa; }

    .detail-row { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; font-size: 14px; }
    .detail-icon { font-size: 16px; flex-shrink: 0; width: 22px; text-align: center; margin-top: 1px; }
    .detail-text { color: #eeeef8; line-height: 1.4; }
    .detail-text a { color: #a78bfa; text-decoration: none; word-break: break-all; }
    .detail-text a:hover { text-decoration: underline; }

    .divider { height: 1px; background: rgba(255,255,255,0.07); margin: 20px 0; }

    .actions { display: flex; flex-direction: column; gap: 10px; }
    .btn-yes { padding: 16px; border-radius: 14px; border: none; background: #a78bfa; color: #0c0c15; font-size: 16px; font-weight: 800; cursor: pointer; font-family: inherit; transition: opacity .15s; }
    .btn-yes:hover { opacity: .88; }
    .btn-no  { padding: 16px; border-radius: 14px; border: 1.5px solid rgba(255,255,255,0.15); background: transparent; color: rgba(238,238,248,0.5); font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all .15s; }
    .btn-no:hover { border-color: rgba(255,255,255,0.3); color: #eeeef8; }

    .confirmed { text-align: center; padding: 16px 0; }
    .confirmed-icon { font-size: 48px; margin-bottom: 12px; }
    .confirmed-title { font-size: 20px; font-weight: 800; margin-bottom: 6px; }
    .confirmed-sub { font-size: 14px; color: rgba(238,238,248,0.5); }

    .loading { text-align: center; color: rgba(238,238,248,0.35); font-size: 14px; padding: 32px 0; }
    .error-msg { text-align: center; color: #f87171; font-size: 14px; padding: 32px 0; }

    .already { font-size: 13px; color: rgba(238,238,248,0.4); text-align: center; margin-top: 12px; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">⚡ Spontany</div>
  <div id="content"><div class="loading">Loading…</div></div>
</div>

<script>
const token = location.pathname.split('/rsvp/')[1];

async function load() {
  try {
    const res = await fetch(`/api/rsvp/${token}`);
    if (!res.ok) throw new Error('invite not found');
    const d = await res.json();
    renderInvite(d);
  } catch(e) {
    document.getElementById('content').innerHTML =
      `<div class="error-msg">This invite link is invalid or has expired.</div>`;
  }
}

function renderInvite(d) {
  const dateLabel = d.date
    ? new Date(d.date + 'T12:00:00').toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long' })
    : null;

  const rows = [];
  if (d.venue)    rows.push(`<div class="detail-row"><span class="detail-icon">✨</span><div class="detail-text">${esc(d.venue)}</div></div>`);
  if (dateLabel)  rows.push(`<div class="detail-row"><span class="detail-icon">📅</span><div class="detail-text">${esc(dateLabel)}${d.time ? ' · ' + esc(d.time) : ''}</div></div>`);
  if (d.location) rows.push(`<div class="detail-row"><span class="detail-icon">📍</span><div class="detail-text">${esc(d.location)}</div></div>`);
  if (d.link)     rows.push(`<div class="detail-row"><span class="detail-icon">🔗</span><div class="detail-text"><a href="${esc(d.link)}" target="_blank" rel="noopener">${esc(d.link.replace(/https?:\/\/(www\.)?/,'').slice(0,50))}</a></div></div>`);

  const alreadyHtml = d.status !== 'pending'
    ? `<div class="already">You already responded: <strong>${d.status === 'accepted' ? '✅ Going' : '❌ Can\'t make it'}</strong></div>`
    : '';

  document.getElementById('content').innerHTML = `
    <div class="invite-label">You're invited by</div>
    <div class="invite-from"><span>${esc(d.inviterName)}</span></div>
    ${rows.join('')}
    ${rows.length ? '<div class="divider"></div>' : ''}
    <div class="actions">
      <button class="btn-yes" onclick="respond('accepted')">✅ Yes, I'm in!</button>
      <button class="btn-no"  onclick="respond('declined')">❌ Can't make it</button>
    </div>
    ${alreadyHtml}
  `;
}

async function respond(status) {
  try {
    const res = await fetch(`/api/rsvp/${token}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status })
    });
    if (!res.ok) throw new Error();
    const d = await res.json();
    document.getElementById('content').innerHTML = `
      <div class="confirmed">
        <div class="confirmed-icon">${status === 'accepted' ? '🎉' : '😢'}</div>
        <div class="confirmed-title">${status === 'accepted' ? 'You\'re in!' : 'Got it!'}</div>
        <div class="confirmed-sub">${esc(d.inviterName)} has been notified.</div>
      </div>
    `;
  } catch(e) {
    alert('Something went wrong — please try again.');
  }
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

load();
</script>
</body>
</html>
