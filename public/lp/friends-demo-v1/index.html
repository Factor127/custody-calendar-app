<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  /* This demo has its own explicit CTAs on every step — suppress the shared
     floating sign-up button auto-injected by lp-tracker.js. */
  #lp-float-cta { display: none !important; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #0a0a0a; color: #fff; min-height: 100vh; min-height: 100dvh; line-height: 1.5;
  }
  .wrap { max-width: 480px; margin: 0 auto; padding: 28px 20px 140px; }
  .logo { margin-bottom: 28px; }
  .logo img { height: 30px; width: auto; display: block; }

  /* Hero */

  /* Progress bar */
  .progress { display: flex; gap: 6px; margin-bottom: 24px; }

  .step-card h2 { font-size: 22px; margin-bottom: 6px; }
  .step-card p.instr { color: rgba(255,255,255,0.55); font-size: 14px; margin-bottom: 20px; }

  /* Intro (step 0) — invite.svg has viewBox 4961×3508 with the portrait
     invite embedded at x=1558,y=105,w=1938,h=3247. We crop to the portrait
     with an overflow:hidden wrapper and scale/offset the SVG to fit. */
  .intro-img-wrap {
    display: block; width: 100%; max-width: 260px; margin: 10px auto 18px;
    aspect-ratio: 1938 / 3247;
    position: relative; overflow: hidden;
    border-radius: 14px;
  }
  .intro-img-wrap img {
    position: absolute;
    width: 256%;  /* 4961 / 1938 = 2.56 */
    height: auto;
    left: -80.4%; /* -(1558/4961) × 256% */

  }
  .intro-copy { text-align: center; margin: 6px 0; }
  .intro-copy h2 { margin-bottom: 8px; }
  .intro-copy p { color: rgba(255,255,255,0.85); font-size: 15px; line-height: 1.45; }

  /* Mini input preview — decorative mini calendar, non-interactive */
  .mini-preview {
    display: block; width: 100%; max-width: 220px;
    margin: 14px auto 18px; padding: 14px;
    background: #0f0f0f; border: 1px solid #1f1f1f; border-radius: 12px;
  }
  .mini-preview .mini-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
  }
  .mini-preview .mini-grid .c {
    aspect-ratio: 1; background: #1a1a1a; border: 1px solid #222;

  }
  .mini-preview .mini-grid .c.you     { background: #c4d630; border-color: #c4d630; }
  .mini-preview .mini-grid .c.them    { background: #a78bfa; border-color: #a78bfa; }
  .mini-preview .mini-grid .c.overlap { background: linear-gradient(135deg, #c4d630 50%, #a78bfa 50%); }
  .mini-preview .mini-legend {
    display: flex; gap: 12px; justify-content: center;

  .intro-arrow {

  .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin: 20px 0; }
  .day {
    aspect-ratio: 1; background: #1a1a1a; border: 1px solid #222; border-radius: 8px;

  .day.selected { background: #c4d630; color: #0a0a0a; border-color: #c4d630; }
  .day.partner  { background: #a78bfa; color: #0a0a0a; border-color: #a78bfa; }
  .day.overlap  { background: linear-gradient(135deg, #c4d630 50%, #a78bfa 50%); color: #0a0a0a; }
  .dow { font-size: 10px; color: rgba(255,255,255,0.35); text-align: center; text-transform: uppercase; letter-spacing: 0.5px; }

  .legend { display: flex; gap: 16px; margin-top: 16px; font-size: 12px; color: rgba(255,255,255,0.6); flex-wrap: wrap; }
  .legend .sw { display: inline-block; width: 12px; height: 12px; border-radius: 3px; vertical-align: middle; margin-right: 6px; }
  .sw.you { background: #c4d630; }
  .sw.them { background: #a78bfa; }
  .sw.both { background: linear-gradient(135deg, #c4d630 50%, #a78bfa 50%); }

  .next {
    width: 100%; margin-top: 24px; padding: 14px; background: #c4d630; color: #0a0a0a;
    border: 0; border-radius: 999px; font-weight: 700; font-size: 15px; cursor: pointer;
    font-family: inherit;
  }
  .next:disabled { opacity: 0.4; cursor: default; }
  .back {
    background: transparent; color: rgba(255,255,255,0.5); border: 0;
    padding: 12px; font-size: 13px; cursor: pointer; font-family: inherit;
  }

  /* Result */
  .result h2 { font-size: 26px; margin-bottom: 4px; }
  .pattern {
    background: rgba(196,214,48,0.06); border: 1px solid rgba(196,214,48,0.18);
    border-radius: 12px; padding: 16px 18px; margin: 16px 0 8px;
  }
  .pattern .pat-lead { font-size: 13px; color: rgba(255,255,255,0.55); margin-bottom: 8px; }
  .pattern .pat-stats { display: flex; gap: 18px; margin-bottom: 8px; flex-wrap: wrap; }
  .pattern .pat-stat .num { font-size: 28px; font-weight: 800; color: #c4d630; line-height: 1; }
  .pattern .pat-stat .lbl { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 4px; }
  .pattern .pat-note { font-size: 12px; color: rgba(255,255,255,0.45); font-style: italic; }

  .suggest-head { margin-top: 22px; margin-bottom: 10px; }
  .suggest-head h3 { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 2px; }
  .suggest-head p  { font-size: 13px; color: rgba(255,255,255,0.55); }

  .result ul.overlap-list { list-style: none; padding: 0; margin: 4px 0 8px; }
  .result ul.overlap-list li {
    padding: 12px 12px; background: #161616; border: 1px solid #242424;
    border-radius: 12px; margin-bottom: 10px;
    cursor: pointer; transition: border-color 0.12s, transform 0.08s;
    position: relative;
    display: flex; gap: 12px; align-items: center;
  }
  .result ul.overlap-list li:hover    { border-color: #c4d630; }
  .result ul.overlap-list li:active   { transform: scale(0.99); }
  .result ul.overlap-list li::after   {
    content: '→'; position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    color: rgba(196,214,48,0.6); font-size: 18px; font-weight: 700;
  }
  .result .opp-thumb {
    width: 56px; height: 56px; border-radius: 10px; flex-shrink: 0;
    background: #0f0f0f center/cover no-repeat;
    border: 1px solid #222;
  }
  .result .opp-body { flex: 1; min-width: 0; padding-right: 22px; }
  .result .opp-date  { font-size: 11px; font-weight: 700; letter-spacing: 0.6px; color: #c4d630; text-transform: uppercase; margin-bottom: 3px; }
  .result .opp-title { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .result .opp-meta  { font-size: 12px; color: rgba(255,255,255,0.55); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* Invite modal */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.75);
    display: none; align-items: flex-start; justify-content: center;
    padding: 40px 16px; overflow-y: auto; z-index: 100;
  }
  .modal-backdrop.open { display: flex; }
  .invite-card {
    width: 100%; max-width: 380px; background: #0e0e12;
    border: 1px solid #23232a; border-radius: 20px; overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .invite-hero-img {
    width: 100%; aspect-ratio: 16 / 9; background: #0a0a0a center/cover no-repeat;
    display: block;
  }
  .invite-head {
    background: linear-gradient(135deg, #1a1530 0%, #0e0e12 100%);
    padding: 20px 22px 18px; border-bottom: 1px solid #23232a;
  }
  .invite-from {
    font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
    color: rgba(255,255,255,0.45); margin-bottom: 4px;
  }
  .invite-from strong { color: #c4d630; font-weight: 700; }
  .invite-head h3 {
    font-size: 22px; font-weight: 800; letter-spacing: -0.01em; color: #fff;
    margin-bottom: 6px;
  }
  .invite-head .invite-tagline { font-size: 13px; color: rgba(255,255,255,0.6); }

  .invite-body { padding: 20px 22px; }
  .invite-row {
    display: flex; gap: 12px; padding: 10px 0;
    border-bottom: 1px solid #1c1c22;
  }
  .invite-row:last-child { border-bottom: 0; }
  .invite-row .ico {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(196,214,48,0.1); color: #c4d630;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 14px; flex-shrink: 0;
  }
  .invite-row .lbl {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px;

  }
  .invite-row .val { font-size: 14px; font-weight: 600; color: #fff; }
  .invite-row .val-sub { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 2px; }

  .invite-actions {
    display: flex; gap: 8px; padding: 14px 22px 18px;
    border-top: 1px solid #1c1c22;
  }
  .invite-btn {
    flex: 1; padding: 12px; border-radius: 999px; font-weight: 700;
    font-size: 13px; font-family: inherit; cursor: not-allowed;
    border: 1px solid #2a2a2a; background: transparent; color: rgba(255,255,255,0.4);
  }
  .invite-btn.primary {
    background: rgba(196,214,48,0.15); color: rgba(196,214,48,0.5);
    border-color: rgba(196,214,48,0.2);
  }

  .mock-note {
    margin: 16px 0 14px; padding: 14px 16px;
    background: rgba(167,139,250,0.08); border: 1px solid rgba(167,139,250,0.2);

  }
  .mock-note strong { color: #a78bfa; }
  .modal-cta  {
    display: block; width: 100%; margin-top: 6px; padding: 14px;
    background: #c4d630; color: #0a0a0a; border: 0; border-radius: 999px;

  }
  .modal-close {
    display: block; width: 100%; margin-top: 8px;

  }
  .modal-wrap {
    width: 100%; max-width: 380px; display: flex; flex-direction: column;
  }
</style>

<body>
  <main class="wrap">
    <div class="logo">
      <img src="/logo-wordmark.svg" alt="Spontany">
    </div>

    <div class="hero">
      <h1>Two schedules.<br><em>One answer.</em></h1>
      <p class="sub">Try Spontany custody match out.</p>
    </div>

    <div class="progress" id="progress">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>

    <section class="step-card" id="step-card"></section>
  </main>

  <!-- Mock invite modal -->
  <div class="modal-backdrop" id="modal" role="dialog" aria-modal="true">
    <div class="modal-wrap">
      <div class="invite-card" id="invite-card"></div>
      <div class="mock-note">
        <strong>This is a mockup.</strong> Real invites go out to your people, track replies,
        and settle on a night automatically - but you need an account to send them.
      </div>
      <a href="#" class="modal-cta" id="modal-cta">Make this a real invite →</a>
      <button class="modal-close" id="modal-close">← Back to suggestions</button>
    </div>
  </div>

  <script>
    // Step content is a single-file mini-SPA. Each step calls LP.step().
    // Steps: 1=intro, 2=your days, 3=partner days, 4=result.
    var TOTAL_STEPS = 4;
    var state = { step: 1, youDays: new Set(), themDays: new Set(), lastOverlap: null };

    var DOW_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    var MONTH     = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    // Build 14 real dates starting today
    var dates = (function() {
      var arr = [];
      var d0 = new Date();
      d0.setHours(0,0,0,0);
      for (var i = 0; i < 14; i++) {
        var d = new Date(d0);
        d.setDate(d0.getDate() + i);
        arr.push(d);
      }
      return arr;
    })();

    // Header DOWs start from today's weekday so columns align
    var headerDows = (function() {
      var arr = [];
      var start = dates[0].getDay();
      for (var i = 0; i < 7; i++) arr.push(DOW_SHORT[(start + i) % 7]);
      return arr;
    })();

    function fmtLong(d) { return DOW_SHORT[d.getDay()] + ', ' + MONTH[d.getMonth()] + ' ' + d.getDate(); }
    function isWeekend(d) { var g = d.getDay(); return g === 5 || g === 6 || g === 0; } // Fri/Sat/Sun treated as weekend

    // Opportunities fetched from DB (see loadOpps below)
    var opportunities = [];

    function daysGrid(selectedSet, partnerSet) {
      var html = '<div class="calendar">';
      headerDows.forEach(function(d) { html += '<div class="dow">' + d + '</div>'; });
      for (var i = 0; i < 14; i++) {
        var classes = 'day';
        var you   = selectedSet.has(i);
        var them  = partnerSet && partnerSet.has(i);
        if (you && them) classes += ' overlap';
        else if (you)    classes += ' selected';
        else if (them)   classes += ' partner';
        html += '<div class="' + classes + '" data-idx="' + i + '">' + dates[i].getDate() + '</div>';
      }
      html += '</div>';
      return html;
    }

    function escapeHtml(s) {
      return String(s == null ? '' : s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    // Belt-and-suspenders client filter: even if the server region filter
    // isn't live yet (deployed before this build), strip anything whose
    // location_name looks non-DFW. Demo audience is Dallas-based divorcees.
    var DALLAS_HINTS = ['dallas','dfw','fort worth','plano','irving','frisco',
                        'mckinney','arlington','garland','mesquite','richardson',
                        'grand prairie','addison','turtle creek','deep ellum',
                        'uptown','highland park','trinity groves',' tx',',tx','texas'];
    function isDallasArea(opp) {
      var loc = ((opp && opp.location_name) || '').toLowerCase();
      if (!loc) return false; // unknown → exclude to be safe
      return DALLAS_HINTS.some(function(k) { return loc.indexOf(k) !== -1; });
    }

    function loadOpps() {
      return fetch('/api/public/opportunities?region=dallas')
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data && Array.isArray(data.opportunities)) {
            var filtered = data.opportunities.filter(isDallasArea);
            opportunities = filtered.sort(function() { return Math.random() - 0.5; });
            if (state.step === 4) render();
          }
        })
        .catch(function() {});
    }

    function render() {
      var card = document.getElementById('step-card');
      var bars = document.querySelectorAll('.progress .bar');
      bars.forEach(function(b, i) {
        b.classList.remove('active','done');
        if (i + 1 < state.step) b.classList.add('done');
        else if (i + 1 === state.step) b.classList.add('active');
      });

      // ── Step 1: intro with two-part walk-through ────────────────────────
      if (state.step === 1) {
        // Decorative mini-calendar: preset "you" / "them" / "overlap" cells
        // so visitors see the shape of the input before they do it themselves.
        var miniCells = '';
        var YOU = {0:1, 3:1, 6:1, 9:1, 12:1};
        var THEM = {0:1, 1:1, 4:1, 9:1, 11:1};
        for (var i = 0; i < 14; i++) {
          var cls = 'c';
          if (YOU[i] && THEM[i]) cls += ' overlap';
          else if (YOU[i])       cls += ' you';
          else if (THEM[i])      cls += ' them';
          miniCells += '<div class="' + cls + '"></div>';
        }

        card.innerHTML =
          '<div class="step-label">HOW IT WORKS</div>' +
          '<h2>Here\'s the idea.</h2>' +

          '<div class="intro-copy">' +
            '<p>You put your <span class="accent">custody pattern</span> in. ' +
            'They do theirs.</p>' +
          '</div>' +
          '<div class="mini-preview">' +
            '<div class="mini-grid">' + miniCells + '</div>' +
            '<div class="mini-legend">' +
              '<span><span class="sw you"></span>You</span>' +
              '<span><span class="sw them"></span>Them</span>' +
              '<span><span class="sw both"></span>Match</span>' +
            '</div>' +
          '</div>' +

          '<div class="intro-arrow">↓</div>' +

          '<div class="intro-copy">' +
            '<p>…and you\'ll see your <span class="accent">match</span>.</p>' +
          '</div>' +
          '<div class="intro-img-wrap"><img src="/lp/friends-demo-v1/invite.svg" alt="Spontany invite preview"></div>' +

          '<button class="next" id="go0">Try it →</button>';

        document.getElementById('go0').addEventListener('click', function() {
          window.LP && LP.step(2, 'your_days');
          state.step = 2; render();
        });

      // ── Step 2: your days ────────────────────────────────────────────────
      } else if (state.step === 2) {
        card.innerHTML =
          '<div class="step-label">STEP 2 OF ' + TOTAL_STEPS + '</div>' +
          '<h2>Tap your kid-free nights.</h2>' +
          '<p class="instr">Next 2 weeks. Just tap the evenings you don\'t have the kids.</p>' +
          daysGrid(state.youDays, null) +
          '<div class="legend"><span><span class="sw you"></span>You (free)</span></div>' +
          '<button class="next" id="go1">Next →</button>' +
          '<button class="back" id="back1">← Back</button>';

        card.querySelector('.calendar').addEventListener('click', function(e) {
          var d = e.target.closest('.day');
          if (!d) return;
          var idx = parseInt(d.dataset.idx);
          if (state.youDays.has(idx)) state.youDays.delete(idx);
          else state.youDays.add(idx);
          render();
        });
        document.getElementById('go1').disabled = state.youDays.size === 0;
        document.getElementById('go1').addEventListener('click', function() {
          window.LP && LP.step(3, 'partner_days');
          state.step = 3; render();
        });
        document.getElementById('back1').addEventListener('click', function() {
          state.step = 1; render();
        });

      // ── Step 3: partner days ─────────────────────────────────────────────
      } else if (state.step === 3) {
        card.innerHTML =
          '<div class="step-label">STEP 3 OF ' + TOTAL_STEPS + '</div>' +
          '<h2>Now imagine your partner\'s.</h2>' +
          '<p class="instr">Tap the nights they\'re kid-free. We\'ll show you where they overlap.</p>' +
          daysGrid(state.themDays, state.youDays) +
          '<div class="legend">' +
            '<span><span class="sw you"></span>You</span>' +
            '<span><span class="sw them"></span>Them</span>' +
            '<span><span class="sw both"></span>Overlap</span>' +
          '</div>' +
          '<button class="next" id="go2">See the overlap →</button>' +
          '<button class="back" id="back2">← Back</button>';

        card.querySelector('.calendar').addEventListener('click', function(e) {
          var d = e.target.closest('.day');
          if (!d) return;
          var idx = parseInt(d.dataset.idx);
          if (state.themDays.has(idx)) state.themDays.delete(idx);
          else state.themDays.add(idx);
          render();
        });
        document.getElementById('go2').disabled = state.themDays.size === 0;
        document.getElementById('go2').addEventListener('click', function() {
          window.LP && LP.complete({ you_days: state.youDays.size, them_days: state.themDays.size });
          state.step = 4; render();
        });
        document.getElementById('back2').addEventListener('click', function() {
          state.step = 2; render();
        });

      // ── Step 4: result (pattern + suggestions) ───────────────────────────
      } else {
        var overlap = [];
        state.youDays.forEach(function(d) { if (state.themDays.has(d)) overlap.push(d); });
        overlap.sort(function(a,b){return a-b;});
        state.lastOverlap = overlap;

        // Pattern math: 14-day sample → monthly projection (×2.17 ≈ 30/14)
        var weekend = 0, weekday = 0;
        overlap.forEach(function(idx) { if (isWeekend(dates[idx])) weekend++; else weekday++; });
        var monthlyWeekend = Math.round(weekend * 30 / 14);
        var monthlyWeekday = Math.round(weekday * 30 / 14);

        var sugg = overlap.slice(0,5).map(function(d, i) {
          var date = dates[d];
          var opp  = opportunities.length ? opportunities[i % opportunities.length] : null;
          var dateStr = fmtLong(date);
          if (opp) {
            var meta = [];
            if (opp.location_name) meta.push(opp.location_name);
            if (opp.category)      meta.push(opp.category);
            var thumbStyle = opp.image_url
              ? ' style="background-image:url(\'' + escapeHtml(opp.image_url) + '\')"'
              : '';
            return '<li data-dayidx="' + d + '" data-oppidx="' + (i % opportunities.length) + '">' +
              '<div class="opp-thumb"' + thumbStyle + '></div>' +
              '<div class="opp-body">' +
                '<div class="opp-date">' + escapeHtml(dateStr) + '</div>' +
                '<div class="opp-title">' + escapeHtml(opp.title) + '</div>' +
                (meta.length ? '<div class="opp-meta">' + escapeHtml(meta.join(' · ')) + '</div>' : '') +
              '</div>' +
            '</li>';
          }
          return '<li data-dayidx="' + d + '">' +
            '<div class="opp-thumb"></div>' +
            '<div class="opp-body">' +
              '<div class="opp-date">' + escapeHtml(dateStr) + '</div>' +
              '<div class="opp-meta">Both free - pick what to do</div>' +
            '</div>' +
          '</li>';
        }).join('');

        var patternHtml = '';
        if (overlap.length) {
          patternHtml =
            '<div class="pattern">' +
              '<div class="pat-lead">Your pattern, roughly:</div>' +
              '<div class="pat-stats">' +
                '<div class="pat-stat"><div class="num">~' + monthlyWeekend + '</div><div class="lbl">weekend night' + (monthlyWeekend === 1 ? '' : 's') + ' / mo</div></div>' +
                '<div class="pat-stat"><div class="num">~' + monthlyWeekday + '</div><div class="lbl">weeknight' + (monthlyWeekday === 1 ? '' : 's') + ' / mo</div></div>' +
              '</div>' +
              '<div class="pat-note">Projected from your 2-week sample. More data = sharper picture.</div>' +
            '</div>';
        }

        card.innerHTML =
          '<div class="result">' +
          '<div class="step-label">STEP 4 OF ' + TOTAL_STEPS + '</div>' +
          '<h2>Your pattern.</h2>' +
          (overlap.length
            ? patternHtml +
              '<div class="suggest-head">' +
                '<h3>Tap a night to see the invite.</h3>' +
                '<p>Suggestions for your upcoming matching nights.</p>' +
              '</div>' +
              '<ul class="overlap-list">' + sugg + '</ul>'
            : '<p style="color:rgba(255,255,255,0.55); margin:16px 0 24px;">No overlap in the next 2 weeks. Try different days, or sync with someone real - the pattern gets clearer with more data.</p>'
          ) +
          '<button class="next" id="signup">Get my real calendar →</button>' +
          '<button class="back" id="back3">← Try different days</button>' +
          '</div>';

        document.getElementById('signup').addEventListener('click', function() {
          window.LP && LP.ctaClick({ button: 'post-demo', overlap: overlap.length });
          window.LP && LP.goToSignup('post-demo');
        });
        document.getElementById('back3').addEventListener('click', function() {
          state.step = 3; render();
        });

        var list = card.querySelector('.overlap-list');
        if (list) {
          list.addEventListener('click', function(e) {
            var li = e.target.closest('li');
            if (!li) return;
            var dIdx = parseInt(li.dataset.dayidx);
            var oIdx = li.dataset.oppidx != null ? parseInt(li.dataset.oppidx) : -1;
            openInvite(dIdx, oIdx);
          });
        }
      }
    }

    function openInvite(dayIdx, oppIdx) {
      var date = dates[dayIdx];
      var opp  = (oppIdx >= 0 && opportunities[oppIdx]) ? opportunities[oppIdx] : null;
      var titleText    = opp ? opp.title : 'A night out';
      var locationText = opp && opp.location_name ? opp.location_name : 'You pick the spot';
      var categoryText = opp && opp.category ? opp.category : null;

      var metaLine = [];
      if (categoryText) metaLine.push(categoryText);
      if (opp && opp.price_tier) metaLine.push(opp.price_tier === 'low' ? '$' : opp.price_tier === 'mid' ? '$$' : opp.price_tier === 'high' ? '$$$' : opp.price_tier);

      var heroHtml = (opp && opp.image_url)
        ? '<div class="invite-hero-img" style="background-image:url(\'' + escapeHtml(opp.image_url) + '\')"></div>'
        : '';

      var card = document.getElementById('invite-card');
      card.innerHTML =
        heroHtml +
        '<div class="invite-head">' +
          '<div class="invite-from">From <strong>You</strong> · via Spontany</div>' +
          '<h3>You\'re invited.</h3>' +
          '<div class="invite-tagline">A night we\'re both actually free.</div>' +
        '</div>' +
        '<div class="invite-body">' +
          '<div class="invite-row">' +
            '<div class="ico">📅</div>' +
            '<div>' +
              '<div class="lbl">When</div>' +
              '<div class="val">' + escapeHtml(fmtLong(date)) + '</div>' +
              '<div class="val-sub">Evening - both kid-free</div>' +
            '</div>' +
          '</div>' +
          '<div class="invite-row">' +
            '<div class="ico">📍</div>' +
            '<div>' +
              '<div class="lbl">What</div>' +
              '<div class="val">' + escapeHtml(titleText) + '</div>' +
              '<div class="val-sub">' + escapeHtml(locationText) + (metaLine.length ? ' · ' + escapeHtml(metaLine.join(' · ')) : '') + '</div>' +
            '</div>' +
          '</div>' +
          '<div class="invite-row">' +
            '<div class="ico">👤</div>' +
            '<div>' +
              '<div class="lbl">For</div>' +
              '<div class="val">Your person</div>' +
              '<div class="val-sub">They get a link - one tap to reply</div>' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<div class="invite-actions">' +
          '<button class="invite-btn" disabled>Maybe</button>' +
          '<button class="invite-btn primary" disabled>I\'m in</button>' +
        '</div>';

      if (typeof sa === 'function') sa('lp_invite_preview_open', {
        day_idx: dayIdx, opp_title: opp ? opp.title : null
      });

      document.getElementById('modal').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeInvite() {
      document.getElementById('modal').classList.remove('open');
      document.body.style.overflow = '';
    }

    document.addEventListener('DOMContentLoaded', function() {
      window.LP && LP.init({ id: 'friends-demo-v1', type: 'demo', totalSteps: TOTAL_STEPS });
      window.LP && LP.step(1, 'intro');
      loadOpps();
      render();

      document.getElementById('modal-close').addEventListener('click', closeInvite);
      document.getElementById('modal').addEventListener('click', function(e) {
        if (e.target.id === 'modal') closeInvite();
      });
      document.getElementById('modal-cta').addEventListener('click', function(e) {
        e.preventDefault();
        window.LP && LP.ctaClick({ button: 'invite-modal' });
        window.LP && LP.goToSignup('invite-modal');
      });
    });
  </script>
</body>
</html>
