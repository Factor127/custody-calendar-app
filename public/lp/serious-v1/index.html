<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Spontany - Let him show he's serious</title>
<meta name="description" content="You shouldn't have to chase his schedule. Send him a link. He fills it in. You see when you're both actually free.">
<link rel="icon" href="/logo3.svg">
<!-- Open Graph / social preview -->
<meta property="og:type" content="website">
<meta property="og:title" content="Let him show he's serious - Spontany">
<meta property="og:description" content="Stop playing detective with his schedule. Send him a link. See when you're both actually free.">
<meta property="og:image" content="https://spontany.io/lp/serious-v1/assets/hero-backdrop.jpg">
<meta property="og:image:width" content="1400">
<meta property="og:image:height" content="932">
<meta property="og:url" content="https://spontany.io/lp/serious-v1/">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Let him show he's serious - Spontany">
<meta name="twitter:description" content="Stop playing detective with his schedule. See when you're both actually free.">
<meta name="twitter:image" content="https://spontany.io/lp/serious-v1/assets/hero-backdrop.jpg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="/sa.js"></script>
<script src="/lp/_shared/lp-tracker.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    color: #fff; min-height: 100vh; line-height: 1.5;
    background: #0a0a0a;
  }
  /* Fixed backdrop image behind everything, with a gradient overlay that
     keeps the image visible at the top (hero) and fades to solid dark
     for form/steps readability further down. */
  .backdrop {
    position: fixed; inset: 0; z-index: -1;
    background: #0a0a0a;
    overflow: hidden;
  }
  /* Image shown at its natural 3:2 aspect on mobile; capped height on desktop. */
  .backdrop::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    aspect-ratio: 3 / 2;
    background: url('/lp/serious-v1/assets/hero-backdrop.webp') top center / cover no-repeat;
  }
  /* Gradient fade ONLY at the bottom edge of the image, into the dark below. */
  .backdrop::after {
    content: ''; position: absolute; left: 0; right: 0;
    top: calc(66.66vw - 80px); height: 140px;
    background: linear-gradient(to bottom, rgba(10,10,10,0) 0%, rgba(10,10,10,0.85) 55%, #0a0a0a 100%);
    pointer-events: none;
  }
  .wrap { max-width: 480px; margin: 0 auto; padding: 28px 20px 140px; position: relative; }
  /* Hero section gets extra top padding so the image carries the visual story */
  .hero-area { padding-top: 42vh; }
  .hero-area h1, .hero-area .sub { text-shadow: 0 2px 14px rgba(0,0,0,0.55); }

  /* Desktop: show the full image centered (not cropped). Constrain both
     width AND height to preserve the 3:2 aspect, and let the base #0a0a0a
     show through as black gutters on either side. */
  @media (min-width: 768px) {
    .backdrop::before {
      aspect-ratio: auto;
      height: min(58vh, 520px);
      width: calc(min(58vh, 520px) * 1.5);
      max-width: 100vw;
      left: 50%; right: auto;
      transform: translateX(-50%);
    }
    .backdrop::after {
      top: calc(min(58vh, 520px) - 80px);
    }
    .hero-area { padding-top: calc(min(58vh, 520px) + 24px); }
    .wrap { max-width: 560px; }
  }
  .logo { margin-bottom: 40px; }
  .logo img { height: 30px; width: auto; display: block; }
  h1 {
    font-size: 36px; line-height: 1.1; font-weight: 800; letter-spacing: -0.02em;
    margin-bottom: 16px;
  }
  h1 em { color: #a78bfa; font-style: normal; }
  .sub { font-size: 17px; color: rgba(255,255,255,0.65); margin-bottom: 32px; }

  .form-card, .picker-card, .copy-card, .phone-card {
    margin-top: 24px; padding: 22px;
    background: linear-gradient(to bottom, rgba(20, 15, 30, 0.95), rgba(15, 15, 22, 0.95));
    border: 1px solid rgba(167,139,250,0.3); border-radius: 16px;
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  }
  .name-question {
    display: block; font-size: 20px; line-height: 1.25; font-weight: 700;
    color: #fff; margin: 4px 0 14px;
    font-family: inherit;
  }
  .name-question em { color: #a78bfa; font-style: normal; font-weight: 800; }
  #your_name {
    width: 100%; padding: 14px 16px; background: #1a1a1a; color: #fff;
    border: 1px solid #2a2a2a; border-radius: 10px; font-size: 16px;
    font-family: inherit; box-sizing: border-box;
  }
  #your_name:focus { outline: 0; border-color: #a78bfa; }

  .preview-label {
    font-size: 11px; color: rgba(255,255,255,0.5); font-weight: 700;
    letter-spacing: 0.6px; text-transform: uppercase;
    margin: 18px 0 6px;
  }
  .sms-bubble {
    padding: 14px 16px; background: #2b2b30; color: #fff;
    border-radius: 16px 16px 16px 4px; font-size: 14px; line-height: 1.45;
    position: relative; word-break: break-word;
  }
  .sms-bubble .url { color: #7dd3fc; }

  .picker-card h3, .copy-card h3, .phone-card h3 {
    font-size: 18px; margin-bottom: 14px; line-height: 1.2;
  }
  .picker-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 14px;
  }
  .picker-btn {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 6px; padding: 16px 8px; background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
    color: #fff; font-family: inherit; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: background 0.15s, border-color 0.15s;
    text-decoration: none; min-height: 78px;
  }
  .picker-btn:hover { background: rgba(167,139,250,0.08); border-color: rgba(167,139,250,0.4); }
  .picker-btn:active { transform: scale(0.98); }
  .picker-btn .icon { font-size: 22px; line-height: 1; }
  .picker-btn.disabled { opacity: 0.35; pointer-events: none; }
  .picker-btn .hint { font-size: 10px; color: rgba(255,255,255,0.4); font-weight: 500; }

  .ghost-btn {
    background: transparent; border: 0; color: rgba(255,255,255,0.5);
    font-family: inherit; font-size: 13px; padding: 6px; cursor: pointer;
    margin-top: 4px;
  }
  .ghost-btn:hover { color: rgba(255,255,255,0.8); }

  .phone-card label { display: block; font-size: 13px; color: rgba(255,255,255,0.65); margin: 14px 0 6px; }
  .phone-card input {
    width: 100%; padding: 13px 14px; background: #1a1a1a; color: #fff;
    border: 1px solid #2a2a2a; border-radius: 10px; font-size: 15px;
    font-family: inherit; box-sizing: border-box;
  }

  .copy-row { display: flex; gap: 8px; margin-bottom: 14px; }
  .copy-row input {
    flex: 1; padding: 12px 14px; background: #1a1a1a; color: #fff;
    border: 1px solid #2a2a2a; border-radius: 10px; font-size: 12px;
    font-family: ui-monospace, Menlo, monospace; min-width: 0;
  }
  .copy-btn {
    padding: 12px 18px; background: rgba(167,139,250,0.15); color: #fff;
    border: 1px solid rgba(167,139,250,0.5); border-radius: 10px;
    font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer;
    white-space: nowrap;
  }
  .copy-btn:active { transform: scale(0.98); }

  /* Result preview teaser */
  .result-teaser {
    margin-top: 32px; padding: 20px; text-align: center;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .teaser-label {
    font-size: 12px; color: rgba(255,255,255,0.5); font-weight: 600;
    letter-spacing: 0.4px; margin-bottom: 12px;
  }
  .invite-preview-img {
    display: block; width: 100%; height: auto; max-width: 560px; margin: 0 auto;
    border-radius: 14px; background: #111;
  }
  label { display: block; margin: 12px 0 6px; font-size: 13px; color: rgba(255,255,255,0.7); }
  input[type="text"], input[type="tel"] {
    width: 100%; padding: 13px 14px; background: #1a1a1a; color: #fff;
    border: 1px solid #2a2a2a; border-radius: 10px; font-size: 15px;
    font-family: inherit;
  }
  input:focus { outline: 0; border-color: #a78bfa; }
  .cta {
    display: inline-block; width: 100%; padding: 15px; margin-top: 18px;
    background: #a78bfa; color: #0a0a0a;
    border: 0; border-radius: 999px; font-weight: 700; font-size: 15px; cursor: pointer;
    font-family: inherit; text-align: center; text-decoration: none; box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }
  .cta:hover   { background: #b89efb; }
  .cta:active  { transform: scale(0.98); }
  .cta:disabled { opacity: 0.6; }
  .fine { color: rgba(255,255,255,0.35); font-size: 11px; margin-top: 10px; line-height: 1.4; }
  .mini { color: rgba(255,255,255,0.4); font-size: 13px; margin-top: 14px; text-align: center; }
  .alt-link {
    display: block; text-align: center; color: rgba(255,255,255,0.55); font-size: 13px;
    margin-top: 14px; text-decoration: underline; text-underline-offset: 3px;
  }
  .alt-link:hover { color: rgba(255,255,255,0.8); }
  .thanks { text-align: center; padding: 30px 10px; }
  .thanks h3 { font-size: 20px; margin-bottom: 8px; color: #a78bfa; }

  .copy-card {
    margin-top: 24px; padding: 24px;
    background: linear-gradient(to bottom, rgba(20, 15, 30, 0.95), rgba(15, 15, 22, 0.95));
    border: 1px solid rgba(167,139,250,0.3); border-radius: 16px; text-align: center;
  }
  .copy-card h3 { font-size: 18px; margin-bottom: 6px; }
  .copy-row {
    display: flex; gap: 8px; margin-top: 12px;
  }
  .copy-row input {
    flex: 1; padding: 13px 14px; background: #1a1a1a; color: #fff;
    border: 1px solid #2a2a2a; border-radius: 10px; font-size: 13px;
    font-family: ui-monospace, Menlo, monospace;
  }
</style>
</head>
<body>
  <div class="backdrop" aria-hidden="true"></div>
  <main class="wrap">
    <div class="logo">
      <img src="/logo-wordmark.svg" alt="Spontany">
    </div>

    <section class="hero-area">
      <h1>Let him <em>show</em> he's serious.</h1>
      <p class="sub">Send him a link to fill in his custody weekends. See when you're actually free.</p>
    </section>

    <div class="form-card" id="form-card">
      <form id="share-form">
        <label for="your_name" class="name-question">Make it personal - <em>what's your name?</em></label>
        <input id="your_name" name="your_name" type="text" placeholder="Alex" maxlength="40" autocomplete="given-name" required>

        <div class="preview-label">He'll see this:</div>
        <div class="sms-bubble" id="sms-preview" aria-live="polite"></div>

        <button class="cta" type="button" id="send-it-btn">Send it →</button>
      </form>
    </div>

    <div class="picker-card" id="picker-card" hidden>
      <h3>Where should we send it to?</h3>
      <div class="picker-grid" id="picker-grid"></div>
      <button type="button" id="picker-back" class="ghost-btn">← back</button>
    </div>

    <div class="copy-card" id="copy-card" hidden>
      <h3>Copy and paste it to him</h3>
      <div class="copy-row">
        <input type="text" id="share-link" readonly>
        <button type="button" id="copy-btn" class="copy-btn">Copy</button>
      </div>
      <a href="#" id="copy-continue" class="cta">Now do yours →</a>
    </div>

    <div class="phone-card" id="phone-card" hidden>
      <h3>We'll text him for you</h3>
      <label for="his_phone">His mobile</label>
      <input id="his_phone" type="tel" placeholder="+1 214 555 0123" autocomplete="tel">
      <button type="button" id="phone-send" class="cta">Send the text →</button>
    </div>

    <div class="result-teaser" id="result-teaser">
      <div class="teaser-label">What you'll see once he fills his in ↓</div>
      <img class="invite-preview-img" src="/lp/serious-v1/assets/lp1-invite.svg" alt="Preview of the invite and overlap result" loading="lazy">
    </div>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      window.LP && LP.init({ id: 'serious-v1', type: 'teaser-share', totalSteps: 0 });

      var form        = document.getElementById('share-form');
      var formCard    = document.getElementById('form-card');
      var pickerCard  = document.getElementById('picker-card');
      var pickerGrid  = document.getElementById('picker-grid');
      var copyCard    = document.getElementById('copy-card');
      var phoneCard   = document.getElementById('phone-card');
      var nameInput   = document.getElementById('your_name');
      var preview     = document.getElementById('sms-preview');
      var sendBtn     = document.getElementById('send-it-btn');

      // ── Device detection ─────────────────────────────────────────────────
      var ua = navigator.userAgent || '';
      var isIOS     = /iPhone|iPad|iPod/i.test(ua);
      var isAndroid = /Android/i.test(ua);
      var isMobile  = isIOS || isAndroid || /Mobile/i.test(ua);
      var canShare  = typeof navigator.share === 'function';

      // ── Live SMS preview ────────────────────────────────────────────────
      // We use a placeholder URL until share is created; then swap to the
      // real token URL in the picker phase.
      var liveToken = null;
      function currentShareUrl() {
        if (liveToken) return location.origin + '/share/' + liveToken;
        return location.origin + '/share/xxxxxxxx';
      }
      function esc(s) {
        return String(s).replace(/[&<>"']/g, function(c) {
          return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
        });
      }
      function buildMessage(name) {
        var n = (name && name.trim()) || 'Your friend';
        return n + ' wants to see when you two are both free. Tap to pick your kid-free nights (no signup): ' + currentShareUrl();
      }
      function renderPreview() {
        var name = nameInput.value.trim();
        var text = buildMessage(name);
        var url  = currentShareUrl();
        // Wrap the URL in a span so it visually pops in the bubble
        var html = esc(text).replace(esc(url), '<span class="url">' + esc(url) + '</span>');
        preview.innerHTML = html;
      }
      nameInput.addEventListener('input', renderPreview);
      renderPreview();

      // ── Utils ────────────────────────────────────────────────────────────
      function utmPayload() {
        var u = {};
        ['utm_source','utm_medium','utm_campaign','utm_content'].forEach(function(k) {
          var v = sessionStorage.getItem(k);
          if (v) u[k] = v;
        });
        return u;
      }

      function createShare(mode, phone) {
        var yourName = nameInput.value.trim();
        if (!yourName) { nameInput.focus(); return Promise.reject('missing_name'); }

        window.LP && LP.ctaClick({ button: 'send-it', mode: mode });
        if (typeof sa === 'function') sa('share_open', { lp_type: 'teaser-share', mode: mode });

        var u = utmPayload();
        return fetch('/api/share/create', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            person_a_name: yourName,
            person_b_phone: phone || undefined,
            mode: mode,
            variant: 'serious-v1',
            session_id: sessionStorage.getItem('sa_sid'),
            utm_source:   u.utm_source,
            utm_campaign: u.utm_campaign,
            utm_content:  u.utm_content,
          }),
        }).then(function(r) { return r.json().then(function(j) { return { ok: r.ok, body: j }; }); });
      }

      function show(which) {
        [formCard, pickerCard, copyCard, phoneCard].forEach(function(el) {
          el.hidden = (el !== which);
        });
      }

      // ── Channel definitions ─────────────────────────────────────────────
      function channelDefs() {
        return {
          imessage: {
            label: 'iMessage', icon: '💬', hint: isIOS ? '' : 'iPhone',
            available: isIOS || isAndroid, // sms: works on both iOS and Android
            open: function(url) {
              var body = buildMessage(nameInput.value.trim());
              // iOS uses &, Android uses ?
              var sep  = isIOS ? '&' : '?';
              location.href = 'sms:' + sep + 'body=' + encodeURIComponent(body);
            },
          },
          whatsapp: {
            label: 'WhatsApp', icon: '🟢', hint: '',
            available: true,
            open: function(url) {
              var body = buildMessage(nameInput.value.trim());
              window.open('https://wa.me/?text=' + encodeURIComponent(body), '_blank');
            },
          },
          messenger: {
            label: 'Messenger', icon: '💭', hint: '',
            available: true,
            open: function(url) {
              var body = buildMessage(nameInput.value.trim());
              if (canShare) {
                navigator.share({ text: body, url: url }).catch(function(){});
              } else {
                // Desktop fallback: copy + open messenger.com
                copyToClipboard(body);
                window.open('https://www.messenger.com/', '_blank');
              }
            },
          },
          copy: {
            label: 'Copy link', icon: '🔗', hint: '',
            available: true,
            open: function(url) { showCopy(url); },
          },
          phone: {
            label: 'Enter his #', icon: '📞', hint: '',
            available: true,
            open: function() { show(phoneCard); document.getElementById('his_phone').focus(); },
          },
        };
      }

      function orderForDevice() {
        if (isIOS)     return ['imessage', 'whatsapp', 'messenger', 'copy', 'phone'];
        if (isAndroid) return ['whatsapp', 'messenger', 'imessage', 'copy', 'phone'];
        return ['whatsapp', 'copy', 'phone', 'messenger', 'imessage'];
      }

      function renderPicker(token) {
        var url  = location.origin + '/share/' + token;
        var defs = channelDefs();
        pickerGrid.innerHTML = '';

        orderForDevice().forEach(function(key) {
          var d = defs[key];
          if (!d) return;
          var btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'picker-btn' + (d.available ? '' : ' disabled');
          btn.innerHTML =
            '<span class="icon">' + d.icon + '</span>' +
            '<span>' + d.label + '</span>' +
            (d.hint ? '<span class="hint">' + d.hint + '</span>' : '');
          btn.addEventListener('click', function() {
            if (typeof sa === 'function') sa('share_sent', { lp_type: 'teaser-share', channel: key });
            d.open(url);
            // After channel click, A continues to her own calendar - unless she
            // picked "phone" (which needs the phone input form first).
            if (key !== 'phone' && key !== 'copy') {
              setTimeout(function() {
                window.location.href = '/share/' + token + '/me';
              }, 900);
            }
          });
          pickerGrid.appendChild(btn);
        });
      }

      // ── Copy-link flow ───────────────────────────────────────────────────
      function showCopy(url) {
        document.getElementById('share-link').value = url;
        document.getElementById('copy-continue').href = url + '/me';
        show(copyCard);
      }
      function copyToClipboard(text) {
        try {
          navigator.clipboard.writeText(text);
        } catch (e) {
          var i = document.createElement('input');
          i.value = text; document.body.appendChild(i);
          i.select(); document.execCommand('copy'); document.body.removeChild(i);
        }
      }
      document.getElementById('copy-btn').addEventListener('click', function() {
        copyToClipboard(document.getElementById('share-link').value);
        this.textContent = 'Copied ✓';
        var self = this;
        setTimeout(function() { self.textContent = 'Copy'; }, 2000);
      });

      // ── Phone-entry flow ─────────────────────────────────────────────────
      document.getElementById('phone-send').addEventListener('click', function() {
        var phone = document.getElementById('his_phone').value.trim();
        if (!phone) { document.getElementById('his_phone').focus(); return; }
        var btn = this;
        btn.disabled = true; btn.textContent = 'Sending…';
        createShare('text', phone).then(function(res) {
          if (res.ok && res.body.token) {
            if (typeof sa === 'function') sa('share_sent', { lp_type: 'teaser-share', channel: 'twilio' });
            window.location.href = '/share/' + res.body.token + '/me';
          } else {
            btn.disabled = false; btn.textContent = 'Try again';
          }
        }, function() {
          btn.disabled = false; btn.textContent = 'Send the text →';
        });
      });

      // ── "Send it" → create share, reveal picker ─────────────────────────
      sendBtn.addEventListener('click', function() {
        sendBtn.disabled = true; sendBtn.textContent = 'Setting up…';
        createShare('copy').then(function(res) {
          if (res.ok && res.body.token) {
            liveToken = res.body.token;
            renderPreview(); // update bubble with real URL
            renderPicker(res.body.token);
            show(pickerCard);
          } else {
            sendBtn.disabled = false; sendBtn.textContent = 'Send it →';
          }
        }, function() {
          sendBtn.disabled = false; sendBtn.textContent = 'Send it →';
        });
      });

      document.getElementById('picker-back').addEventListener('click', function() {
        show(formCard);
        sendBtn.disabled = false; sendBtn.textContent = 'Send it →';
      });
    });
  </script>
</body>
</html>
